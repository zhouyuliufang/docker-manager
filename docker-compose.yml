version: '3.8'

services:
  docker-manager:
    build: .
    container_name: docker-manager
    ports:
      # 外部端口:容器内部端口
      - "9999:80"
    volumes:
      # Docker socket（容器管理必须）
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker daemon.json（镜像加速器必须）
      - /etc/docker:/etc/docker
      # ★ 数据目录挂载：密码、历史记录、保存的compose都持久化到这里
      # 使用绝对路径，或者修改为你的实际路径
      # 示例（请根据你的实际位置修改）:
      # - /path/to/your/data:/data
      - ./data:/data:rw
      # 前端界面（开发时可启用，生产建议注释掉）
      # - ./index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    # 可选：如果你想固定访问IP
    # networks:
    #   default:
    #     ipv4_address: 192.168.0.xxx
